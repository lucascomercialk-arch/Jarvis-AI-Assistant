<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis 2.0</title>
</head>
<body>

    <style>
        body{
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b0f14;
            color: #e6edf3;
        }
        .container{
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px;
        }
        .header h1{
            margin: 0;
            color: #00ffd5;
            font-size: 36px;
        }
        .header p {
            margin-top: 8px;
            color: #9fb0c0;
        }
        .card {
            background: #111826;
            border: 1px solid #1f2a3a;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 213, 0.05);
        }

    
        button {
            background-color: #00ffd5;
            color: #081018;
            border: none;
            padding: 10px 14px;
            margin: 6px 6px 0 0; 
            cursor: pointer;
            font-weight: bold;
            border-radius: 8px;
        }
    
        button:hover{
            background-color: #00c9aa;
        }

        .resposta-box {
            margin-top: 25px;
            background: #111826;
            border: 1px solid #1f2a3a;
            border-radius: 14px;
            padding: 20px;
        }
        #resposta{
            color: #ffffff;
            font-size: 18px;
            margin-top:10px;
        }

    </style>

    <div class="container">
        <div class=""header">
        <h1>Jarvis 2.0</h1>
        <p>Seu centro de automação pessoal</p>
        </div>
        
        <div class="grid">
            <div class ="card">
            <h2>Status</h2>
            <p class="status-text">Verifique rapidamente se o sistema está funcionando.</p>
            <button onclick="verStatus()">Ver status</button>
            </div>
        </div>

        <div class="card">
            <h2>Modos do Jarvis</h2>
            <p class="status-text">Ative um modo de trabalho de acordo com sua rotina.</p>
            <button onclick="modoClinica()">Clinica</button>
            <button onclick="modoFaculdade()">Faculdade</button>
            <button onclick="modoProjeto()">Projeto</button>
            <button onclick="modoVendas()">Vendas</button>
        </div>
    </div>
    
    <div class="resposta-box">
        <h2>Resposta do sistema</h2>
        <p id="resposta">Aguardando comando...</p>
    </div>

    <script>
        function dizerOla(){
            fetch('/comando/ola')
            .then(resp => resp.json())
            .then(data =>{
                document.getElementsById('resposta').innerText = data.msg;
            });
        }
        function verStatus(){
            fetch('/status')
            .then(resp => resp.json())
            .then(data =>{
                document.getElementsById('resposta').innerText = data.msg;
            });
        } 
        function Abrir(){
            fetch('/abrir')
            .then(resp => resp.json())
            .then(data =>{
                document.getElementsById('resposta').innerText = data.msg;
            });
        } 
        function modoClinica(){
            fetch('/modo/clinica')
            .then(resp => resp.json())
            .then(data =>{
                document.getElementsById('resposta').innerText = data.msg;
            });
        } 
        function modoFaculdade(){
            fetch('/modo/faculdade')
            .then(resp => resp.json())
            .then(data =>{
                document.getElementsById('resposta').innerText = data.msg;
            });
        } 
        function modoProjeto(){
            fetch('/modo/projeto')
            .then(resp => resp.json())
            .then(data =>{
                document.getElementsById('resposta').innerText = data.msg;
            });
        } 
        function modoVendas(){
            fetch('/modo/vendas')
            .then(resp => resp.json())
            .then(data =>{
                document.getElementsById('resposta').innerText = data.msg;
            });
        } 

        function limparTela(){
                document.getElementsById('resposta').innerText = "";
        }            
    </script>

</body>
</html>
