<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis 2.0</title>
</head>
<body>

    <style>
        body{
            background-color: #0d1117;
            color: #00ffe1;
            font-family: Arial;
            text-align: center;
            padding-top: 50px;
        }

        h1{
            font-size: 40px;
        }

        button {
            background-color: #00ffe1;
            border: none;
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
        }
    
        button:hover{
            background-color: #00bfa6;
        }

        #resposta {
            margin-top: 20px;
            font-size: 20px;
        }

    </style>
    <h2>Modos do Jarvis</h2>
    <button onclick="modoClinica()">Clínica</button>
    <button onclick="modoFaculdade()">Faculdade</button>
    <button onclick="modoProjeto()">Projeto</button>
    <button onclick="modoVendas()">Vendas</button>
    
    <h1>Jarvis 2.0</h1>
    
    <button onclick="dizerOla()">Falar com Jarvis</button>
    <button onclick="verStatus()">Ver Status</button>
    <button onclick="Abrir()">Abrir</button>
    <button onclick="limparTela()">Limpar Tela</button>

    <p id="resposta"></p>

    <script>
        function dizerOla(){
            fetch('/comando/ola')
            .then(resp => resp.json())
            .then(data =>{
                document.getElementsById('resposta').innerText = data.msg;
            });
        }
        function verStatus(){
            fetch('/status')
            .then(resp => resp.json())
            .then(data =>{
                document.getElementsById('resposta').innerText = data.msg;
            });
        } 
        function Abrir(){
            fetch('/abrir')
            .then(resp => resp.json())
            .then(data =>{
                document.getElementsById('resposta').innerText = data.msg;
            });
        } 
        function modoClinica(){
            fetch('/modo/clinica')
            .then(resp => resp.json())
            .then(data =>{
                document.getElementsById('resposta').innerText = data.msg;
            });
        } 
        function modoFaculdade(){
            fetch('/modo/faculdade')
            .then(resp => resp.json())
            .then(data =>{
                document.getElementsById('resposta').innerText = data.msg;
            });
        } 
        function modoProjeto(){
            fetch('/modo/projeto')
            .then(resp => resp.json())
            .then(data =>{
                document.getElementsById('resposta').innerText = data.msg;
            });
        } 
        function modoVendas(){
            fetch('/modo/vendas')
            .then(resp => resp.json())
            .then(data =>{
                document.getElementsById('resposta').innerText = data.msg;
            });
        } 

        function limparTela(){
                document.getElementsById('resposta').innerText = "";
        }            
    </script>

</body>
</html>
